<!DOCTYPE html>
<html>
    <head>
        <title> JavaScript Example 01</title>
    </head>
    <body>
        <script>
            let a = 10;
            const b = "hello"; // constant can't be change value
            var c = 201.11; 

            console.log("a = ", a);
            console.log("b = ", b);
            console.log("c = ", c);

            a = "testing....";
            // b = "world"; // error due to constant value
            c = 111.22; // javascript combined all the number value
            // whether it int or double or long or float

            console.log("a = ", a);
            console.log("b = ", b);
            console.log("c = ", c);
        </script>
    </body>
</html>
